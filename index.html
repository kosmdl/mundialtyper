function fmtDur(ms) {
  if (ms <= 0) return "już trwa";
  const s = Math.floor(ms / 1000), d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${ss}s`;
  return `${m}m ${ss}s`;
}

/* punkty bonusowe gracza: porównuje jego odpowiedzi z rozstrzygnięciami (q.answer) */
function bonusFor(answers, bonus) {
  let total = 0; const hits = {};
  for (const q of bonus) {
    const ans = (q.answer || "").trim(); if (!ans) continue;
    const pick = ((answers || {})[q.id] || "").trim(); if (!pick) continue;
    const ok = q.type === "text" ? scorerHit(pick, ans) : pick === ans;
    if (ok) { total += q.points || 0; hits[q.id] = true; }
  }
  return { total, hits };
}

  if (ms <= 0) return "";
  const m = Math.floor(ms / 60000), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (d >= 1) return `za ${d} ${d === 1 ? "dzień" : "dni"} ${h % 24} h`;
  if (h >= 1) return `za ${h} h ${m % 60} min`;

}

/* punktacja gracza po zbiorze rozegranych meczów (używane w rankingu i w historii) */
function tally(users, matchList, betsByUser, points) {
  return users.map((u) => {
    let total = 0, ex = 0, df = 0, wn = 0, sc = 0;
    for (const m of matchList) {
      const b = (betsByUser[u.id] || {})[m.id];
      if (!b || !m.result) continue;
      const r = m.result;
      const hasExact = b.exactHome !== "" && b.exactHome != null && b.exactAway !== "" && b.exactAway != null;
      if (hasExact && Number(b.exactHome) === Number(r.homeScore) && Number(b.exactAway) === Number(r.awayScore)) { total += points.exact; ex++; }
      if (hasExact && (Number(b.exactHome) - Number(b.exactAway)) === (Number(r.homeScore) - Number(r.awayScore))) { total += points.diff; df++; }
      const aw = Number(r.homeScore) > Number(r.awayScore) ? "home" : Number(r.homeScore) < Number(r.awayScore) ? "away" : "draw";
      if (b.winner && b.winner === aw) { total += points.winner; wn++; }
      if (b.firstScorer && r.firstScorer && scorerHit(b.firstScorer, r.firstScorer)) { total += points.scorer; sc++; }
    }
    return { ...u, total, ex, df, wn, sc };

.btn.grass{background:linear-gradient(180deg,var(--grass),var(--grass-d));box-shadow:0 8px 22px rgba(39,213,134,.28)}
.btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-d));box-shadow:0 8px 22px rgba(244,201,93,.26)}
.btn.grass:hover:not(:disabled),.btn.gold:hover:not(:disabled){transform:translateY(-1px)}
.btn.ghost{background:var(--panel-2);color:var(--txt);border:1px solid var(--line)}
.btn.ghost:hover:not(:disabled){background:rgba(255,255,255,.12)}
.btn.danger{background:rgba(232,64,58,.16);color:#ffb3b3;border:1px solid rgba(232,64,58,.34)}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:10px}
.icobtn{display:grid;place-items:center;width:40px;height:40px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);color:var(--txt);cursor:pointer;transition:.15s}
.icobtn:hover{background:rgba(255,255,255,.12)}

/* tables */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{font-size:10.5px;letter-spacing:1.1px;text-transform:uppercase;color:var(--muted);text-align:left;padding:9px 10px;font-weight:800;border-bottom:1px solid var(--line)}
.tbl td{padding:11px 10px;border-bottom:1px solid rgba(255,255,255,.055);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.hit{background:rgba(244,201,93,.13);border-radius:7px;color:var(--gold);font-weight:700}
.hit2{background:rgba(56,189,248,.16);border-radius:7px;color:#7dd3fc;font-weight:700}
.gtag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:3px 9px;border-radius:999px}
.daybar{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px}
.daypill{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 13px;border-radius:12px;cursor:pointer;background:var(--panel);border:1px solid var(--line);color:var(--muted);transition:.15s;min-width:78px}
.daypill:hover{color:var(--txt);border-color:rgba(255,255,255,.25)}
.daypill.on{background:linear-gradient(180deg,var(--gold),var(--gold-d));color:#081226;border-color:transparent;box-shadow:0 6px 16px rgba(244,201,93,.22)}
.daypill .dpn{font-family:var(--fd);font-size:14px;letter-spacing:.4px}
.daypill .dpd{font-size:11px;font-weight:700;text-transform:capitalize}
.xtab{border-collapse:separate;border-spacing:0;width:100%;font-size:13px}
.xtab th{font-size:11px;letter-spacing:.4px;color:var(--muted);font-weight:800;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:center}
.xtab td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center}
.xtab tr:last-child td{border-bottom:none}
.xtab .mcol{position:sticky;left:0;text-align:left;z-index:1;background:#0d1838}
.pick{display:inline-grid;place-items:center;width:32px;height:23px;border-radius:5px;outline:2px solid transparent}
.pick.ok{outline-color:var(--grass);box-shadow:0 0 0 3px rgba(39,213,134,.18)}
.pick.no{opacity:.45}
.pickd{display:inline-grid;place-items:center;min-width:26px;height:23px;padding:0 6px;border-radius:6px;font-family:var(--fd);font-size:13px;background:rgba(255,255,255,.08);color:var(--muted)}
.pickd.ok{background:rgba(39,213,134,.2);color:#7df0b6;outline:2px solid var(--grass)}
.pickd.no{opacity:.55}
.you{color:var(--grass);font-weight:800}

/* ranking */
.rank{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;margin-bottom:10px;
  background:var(--panel);border:1px solid var(--line);animation:rise .45s both}
.rank.top{background:linear-gradient(100deg, rgba(244,201,93,.16), rgba(255,255,255,.04));border-color:rgba(244,201,93,.36)}
.pos{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-family:var(--fd);font-size:20px;flex:0 0 auto;
  background:rgba(0,0,0,.3);color:var(--muted)}
.pos.g{background:linear-gradient(150deg,var(--gold),var(--gold-d));color:#081226}
.pos.s{background:linear-gradient(150deg,#dfe6ea,#a9b4ba);color:#1a2420}
.pos.b{background:linear-gradient(150deg,#d79a63,#a86b3c);color:#241409}
.pts{font-family:var(--fd);font-size:30px;color:var(--gold);line-height:1}

/* misc */
.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.divider{height:1px;background:var(--line);margin:14px 0}
.note{font-size:12.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start}
.kpi{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--muted)}
.kpi b{color:var(--txt)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;background:#0c1430;border:1px solid var(--line);
  color:var(--txt);padding:12px 18px;border-radius:13px;box-shadow:0 18px 50px rgba(0,0,0,.5);font-size:14px;font-weight:600;animation:rise .25s both}
.pot{display:inline-flex;align-items:center;gap:13px;padding:11px 16px;border-radius:15px;
  background:linear-gradient(120deg, rgba(244,201,93,.15), rgba(255,255,255,.04));
  border:1px solid rgba(244,201,93,.34);box-shadow:0 12px 30px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.06)}
.pot-ic{display:grid;place-items:center;width:40px;height:40px;border-radius:12px;color:#081226;flex:0 0 auto;
  background:linear-gradient(140deg,var(--grass) 0%,var(--gold) 52%,var(--coral) 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.pot-l{font-size:10.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.pot-sub{font-size:11.5px;color:var(--muted);font-weight:600}
.pot-amt{font-family:var(--fd);font-size:31px;line-height:1;color:var(--gold);margin-left:8px;text-shadow:0 3px 14px rgba(244,201,93,.22);white-space:nowrap}
.ministat{display:inline-flex;align-items:center;gap:12px;padding:11px 16px;border-radius:15px;background:var(--panel);border:1px solid var(--line);box-shadow:0 12px 30px rgba(0,0,0,.26);text-align:left;font-family:var(--fb)}
button.ministat{cursor:pointer;transition:.15s}
button.ministat:hover{background:var(--panel-2);border-color:rgba(255,255,255,.22);transform:translateY(-1px)}
.ministat.ms-warn{border-color:rgba(232,64,58,.42)}
.ms-ic{display:grid;place-items:center;width:38px;height:38px;border-radius:11px;flex:0 0 auto;color:#081226;box-shadow:inset 0 1px 0 rgba(255,255,255,.35)}
.ms-blue{background:linear-gradient(140deg,#60a5fa,#3b82f6)}
.ms-red{background:linear-gradient(140deg,#f87171,var(--coral))}
.ms-gold{background:linear-gradient(140deg,#f7d774,var(--gold-d))}
.ms-big{font-family:var(--fd);font-size:23px;line-height:1.05;color:var(--txt)}
.live-panel{border-color:rgba(232,64,58,.4)}
.livedot{width:10px;height:10px;border-radius:50%;background:var(--coral);animation:lpulse 1.4s infinite}
@keyframes lpulse{0%{box-shadow:0 0 0 0 rgba(232,64,58,.55)}70%{box-shadow:0 0 0 9px rgba(232,64,58,0)}100%{box-shadow:0 0 0 0 rgba(232,64,58,0)}}
.liverow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.18)}
.liverow .lt{display:flex;align-items:center;gap:8px;min-width:0}
.liverow .rt{justify-content:flex-end}
.liverow .ln{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.liverow .lscore{font-family:var(--fd);font-size:22px;color:var(--gold);white-space:nowrap}
.liverow .lsep{margin:0 5px;color:var(--muted)}
.liverow .lmin{grid-column:1 / -1;text-align:center;font-size:11px;color:#ff9a9a;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.tbl.grp th,.tbl.grp td{padding:7px 8px;font-size:13px}
.tbl tr.adv td{background:rgba(39,213,134,.09)}
.tbl tr.adv3 td{background:rgba(244,201,93,.10)}
.bkt{display:flex;min-width:max-content;height:940px;--cw:22px;--bl:rgba(255,255,255,.24)}
.bkt .rnd{display:flex;flex-direction:column;width:188px}
.bkt .rnd:not(:first-child){margin-left:var(--cw)}
.bkt .rh{height:24px;display:flex;align-items:center;font-size:11px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted)}
.bkt .col{flex:1;display:flex;flex-direction:column}
.bkt .m{flex:1;display:flex;align-items:center;position:relative}
.bkt .mb{width:100%;background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:9px;padding:4px 9px}
.bkt .rnd:not(:last-child) .m::after{content:"";position:absolute;left:100%;top:50%;width:var(--cw);height:2px;background:var(--bl)}
.bkt .rnd:not(:last-child) .m:nth-child(odd)::before{content:"";position:absolute;left:100%;top:50%;width:var(--cw);height:50%;border-right:2px solid var(--bl)}
.bkt .rnd:not(:last-child) .m:nth-child(even)::before{content:"";position:absolute;left:100%;bottom:50%;width:var(--cw);height:50%;border-right:2px solid var(--bl)}
.bno{font-size:9px;color:var(--muted);font-family:var(--fd);letter-spacing:.5px;display:block;margin-bottom:1px}
.bteam{display:flex;align-items:center;gap:6px;padding:0}
.bteam .bnm{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdot{width:16px;height:12px;border-radius:2px;background:rgba(255,255,255,.08);flex:0 0 auto;display:inline-block}
.dfn{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:42%}
.scorer-sel{cursor:pointer}
.scorer-sel option,.scorer-sel optgroup{background:var(--panel-2);color:var(--txt)}
.scorer-sel optgroup{font-weight:800;color:var(--gold);font-family:var(--fb)}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{height:10px;width:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}

/* flaga: wbudowany SVG (działa offline na każdym urządzeniu); emoji jako zapas */
function Flag({ code, size = "fl-md" }) {
  if (!code) return null;
  const svg = FLAG_SVG[code];
  if (svg) return <span className={`flag ${size}`} title={code} dangerouslySetInnerHTML={{ __html: svg }} />;
  return <span className={`flag ${size}`} title={code}><span className="fe">{codeEmoji(code)}</span></span>;
}

/* ============================================================
   APLIKACJA
   ============================================================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [busy, setBusy] = useState(false);
  const [now, setNow] = useState(Date.now());
  const [toast, setToast] = useState("");

  const [users, setUsers] = useState([]);
  const [matches, setMatches] = useState([]);
  const [settings, setSettings] = useState({ points: DEFAULT_POINTS });
  const [betsByUser, setBetsByUser] = useState({}); // {userId:{matchId:bet}}
  const [bonusByUser, setBonusByUser] = useState({}); // {userId:{questionId:answer}}
  const [bonusDraft, setBonusDraft] = useState({});   // moje edytowalne typy bonusowe
  const [live, setLive] = useState([]);               // mecze na żywo (z ESPN, wersja standalone)

  const [me, setMe] = useState(() => { try { const s = localStorage.getItem("ms2026_me"); return s ? JSON.parse(s) : null; } catch (e) { return null; } });           // sesja (tylko w pamięci)
  const [tab, setTab] = useState("typuj");
  const [draft, setDraft] = useState({});       // mój edytowalny typ {matchId:{...}}
  /* składy zawodników są wbudowane (stała SQUADS) — bez stanu i bez pobierania */
  const [selDay, setSelDay] = useState(null);   // wybrany dzień (klucz daty ET)
  const [selDay2, setSelDay2] = useState(null); // wybrany dzień w zakładce „Dni"
  const [prof, setProf] = useState({ name: "", pin: "", pin2: "", err: "", ok: "" }); // edycja konta

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2600); };

  /* --- wczytanie wspólnego stanu --- */
  const loadShared = useCallback(async () => {
    const [u, m, s] = await Promise.all([store.get("users"), store.get("matches"), store.get("settings")]);
    setUsers(u ? JSON.parse(u) : []);
    setMatches(m ? JSON.parse(m) : []);
    setSettings(s ? JSON.parse(s) : { points: DEFAULT_POINTS });
    const keys = await store.list("bets:");
    const all = {};
    for (const k of keys) {
      const v = await store.get(k);
      if (v) all[k.slice(5)] = JSON.parse(v);
    }
    setBetsByUser(all);
    const bkeys = await store.list("bonus:");
    const allB = {};
    for (const k of bkeys) {
      const v = await store.get(k);
      if (v) allB[k.slice(6)] = JSON.parse(v);
    }
    setBonusByUser(allB);
  }, []);

  useEffect(() => {
    (async () => { await loadShared(); setLoading(false); })();
    const t1 = setInterval(() => setNow(Date.now()), 1000);
    const t2 = setInterval(() => { loadShared(); }, 15000);
    return () => { clearInterval(t1); clearInterval(t2); };
  }, [loadShared]);

  /* seed mojego draftu z zapisanych typów (bez nadpisywania edycji) */
  useEffect(() => {
    if (!me) return;
    const mine = betsByUser[me.id] || {};
    setDraft((d) => {
      const next = { ...d };
      for (const mid of Object.keys(mine)) if (next[mid] === undefined) next[mid] = { ...mine[mid] };
      return next;
    });
  }, [me, betsByUser]);

  useEffect(() => {
    if (!me) return;
    const mine = bonusByUser[me.id] || {};
    setBonusDraft((d) => { const next = { ...d }; for (const k of Object.keys(mine)) if (next[k] === undefined) next[k] = mine[k]; return next; });
  }, [me, bonusByUser]);

  useEffect(() => { try { if (me) localStorage.setItem("ms2026_me", JSON.stringify(me)); else localStorage.removeItem("ms2026_me"); } catch (e) {} }, [me]);
  const points = settings.points || DEFAULT_POINTS;
  const isLocked = (mt) => now >= new Date(mt.kickoff).getTime();
  const bonus = settings.bonus || DEFAULT_BONUS;
  const bonusDeadline = settings.bonusDeadline || DEFAULT_BONUS_DEADLINE;
  const bonusLocked = now >= new Date(bonusDeadline).getTime();

  /* --- ranking i historia liczone automatycznie --- */
  const standings = useMemo(
    () => tally(users, matches.filter((m) => m.finished && m.result), betsByUser, points),
    [users, matches, betsByUser, points]
  );
  const checkpoints = useMemo(() => {
    const done = matches.filter((m) => m.finished && m.result).sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));
    const groups = [];
    for (const m of done) {
      const key = m.roundLabel || ("Mecze: " + fmtDayKey(m.kickoff));
      let g = groups.find((x) => x.key === key);
      if (!g) { g = { key, first: new Date(m.kickoff).getTime(), matches: [] }; groups.push(g); }
      g.matches.push(m);
    }
    groups.sort((a, b) => a.first - b.first);
    let cum = [];
    return groups.map((g) => { cum = cum.concat(g.matches); return { label: g.key, table: tally(users, cum, betsByUser, points) }; });
  }, [matches, users, betsByUser, points]);
  const bonusPtsByUser = useMemo(() => {
    const out = {};
    for (const u of users) out[u.id] = bonusFor(bonusByUser[u.id] || {}, bonus);
    return out;
  }, [users, bonusByUser, bonus]);
  const standingsFull = useMemo(() =>
    standings.map((u) => { const bp = bonusPtsByUser[u.id] || { total: 0 }; return { ...u, bonusPts: bp.total, grand: u.total + bp.total }; })
      .sort((a, b) => b.grand - a.grand || a.name.localeCompare(b.name, "pl")),
    [standings, bonusPtsByUser]);

  const grpData = useMemo(() => {
    const tables = {}, complete = {};
    for (const L of GROUP_LETTERS) {
      const ms = matches.filter((m) => m.group === L);
      const teams = {};
      const add = (code, name) => { if (code && !teams[code]) teams[code] = { name, code, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }; };
      ms.forEach((m) => { add(m.homeCode, m.homeTeam); add(m.awayCode, m.awayTeam); });
      ms.forEach((m) => {
        if (!m.finished || !m.result || !teams[m.homeCode] || !teams[m.awayCode]) return;
        const h = teams[m.homeCode], a = teams[m.awayCode];
        const hs = Number(m.result.homeScore), as = Number(m.result.awayScore);
        h.p++; a.p++; h.gf += hs; h.ga += as; a.gf += as; a.ga += hs;
        if (hs > as) { h.w++; h.pts += 3; a.l++; } else if (hs < as) { a.w++; a.pts += 3; h.l++; } else { h.d++; a.d++; h.pts++; a.pts++; }
      });
      tables[L] = Object.values(teams).sort((x, y) => y.pts - x.pts || (y.gf - y.ga) - (x.gf - x.ga) || y.gf - x.gf || x.name.localeCompare(y.name, "pl"));
      complete[L] = ms.length >= 6 && ms.every((m) => m.finished && m.result);
    }
    const allComplete = GROUP_LETTERS.every((L) => complete[L] && tables[L].length >= 3);
    const thirdsRank = GROUP_LETTERS.map((L) => ({ L, t: tables[L][2] })).filter((x) => x.t)
      .sort((a, b) => b.t.pts - a.t.pts || (b.t.gf - b.t.ga) - (a.t.gf - a.t.ga) || b.t.gf - a.t.gf || a.L.localeCompare(b.L));
    const thirdAssign = (allComplete && thirdsRank.length >= 8) ? assignThirds(thirdsRank.slice(0, 8).map((x) => x.L)) : null;
    const resolveSide = (def, mNo) => {

      return g && tables[g][2] ? { label: tables[g][2].name, code: tables[g][2].code } : { label: "3. miejsce", code: "" };
    };
    const sides = {};
    for (const r of R32_DEF) { sides[r.m + "a"] = resolveSide(r.a, r.m); sides[r.m + "b"] = resolveSide(r.b, r.m); }

  const AUTO_ESPN_DELAY_MS = 2 * 60 * 60 * 1000;

        if (cancelled) return;
        for (const m of byDate[ymd]) {
          const ev = events.find((e) => { const c = e.competitions && e.competitions[0]; if (!c) return false; const codes = (c.competitors || []).map(codeOfComp); return codes.indexOf(m.homeCode) >= 0 && codes.indexOf(m.awayCode) >= 0; });

          confirmed.push({ id: m.id, result: { homeScore: Number(home.score), awayScore: Number(away.score), firstScorer: scorer } });
        }

      const map = {}; confirmed.forEach((x) => { map[x.id] = x.result; });

        return homeWin ? { label: fm.awayTeam, code: fm.awayCode } : { label: fm.homeTeam, code: fm.homeCode };
      }
      return { label: "Przegr. M" + mn, code: "" };
    };
    if (ko === 103) return which === "a" ? loseOf(101) : loseOf(102);
    const def = [...R16_DEF, ...QF_DEF, ...SF_DEF, FIN_DEF].find((d) => d.m === ko);
    if (!def) return { label: "?", code: "" };
    return winOf(which === "a" ? def.a : def.b);
  }
  function sidesOf(m) {
    if (m.homeCode || m.awayCode || !m.ko) return [{ label: m.homeTeam, code: m.homeCode }, { label: m.awayTeam, code: m.awayCode }];
    return [koSide(m.ko, "a"), koSide(m.ko, "b")];
  }

  function renderDni() {
    if (!matches.length) return (
      <div className="panel" style={{ textAlign: "center", padding: 40 }}>
        <Calendar size={34} className="muted" style={{ margin: "0 auto 12px" }} />
        <h3 style={{ fontSize: 22, marginBottom: 8 }}>Brak meczów</h3>
        <p className="muted" style={{ fontSize: 14 }}>Tabele dni pojawią się, gdy będzie terminarz i pierwsze wyniki.</p>
      </div>
    );
    const day = days.find((d) => d.key === selDay2) || days[0];
    if (!day) return null;
    const idx = days.findIndex((d) => d.key === day.key);
    const dayDone = day.matches.filter((m) => m.finished && m.result);
    const dayTbl = tally(users, dayDone, betsByUser, points);
    const dayEndTs = day.matches.reduce((mx, m) => Math.max(mx, new Date(m.kickoff).getTime()), 0);
    const cumMap = {};
    tally(users, matches.filter((m) => m.finished && m.result && new Date(m.kickoff).getTime() <= dayEndTs), betsByUser, points).forEach((u) => { cumMap[u.id] = u.total; });
    return (
      <div style={{ display: "grid", gap: 16 }}>
        <div className="panel" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div><h2 style={{ fontSize: 24 }}>Tabele dni</h2><p className="muted" style={{ fontSize: 13 }}>Podsumowanie każdego dnia: typy zwycięzcy i zdobyte punkty.</p></div>
          <Calendar size={28} style={{ color: "var(--gold)" }} />
        </div>
        <div className="daybar">
          {days.map((d, i) => (
            <button key={d.key} className={`daypill ${d.key === day.key ? "on" : ""}`} onClick={() => setSelDay2(d.key)}>
              <span className="dpn">Dzień {i + 1}</span>
              <span className="dpd">{fmtDayShort(dayAnchorTs(d.key))}</span>
            </button>
          ))}
        </div>
        <div className="panel" style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <button className="icobtn" disabled={idx <= 0} onClick={() => setSelDay2(days[idx - 1].key)}><ChevronLeft size={18} /></button>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontFamily: "var(--fd)", fontSize: 20, textTransform: "capitalize" }}>{fmtDayLabel(dayAnchorTs(day.key))}</div>
            <div className="muted" style={{ fontSize: 12 }}>{dayDone.length}/{day.matches.length} {plMecz(day.matches.length)} rozliczone</div>
          </div>
          <button className="icobtn" disabled={idx >= days.length - 1} onClick={() => setSelDay2(days[idx + 1].key)}><ChevronRight size={18} /></button>
        </div>
        {renderDayFixtures(day)}
        {dayDone.length > 0 && renderDayTable(day)}
        {dayDone.length > 0 && (
          <div className="panel">
            <h3 style={{ fontSize: 17, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><Target size={15} /> Punkty tego dnia</h3>
            <div style={{ overflowX: "auto" }}>
              <table className="tbl">
                <thead><tr><th>#</th><th>Gracz</th><th style={{ textAlign: "right" }}>Pkt dnia</th><th style={{ textAlign: "right" }}>Łącznie</th></tr></thead>
                <tbody>
                  {dayTbl.map((u, i) => (
                    <tr key={u.id}>
                      <td style={{ fontFamily: "var(--fd)", fontSize: 16, color: i === 0 && u.total > 0 ? "var(--gold)" : "var(--muted)" }}>{i + 1}</td>
                      <td className={u.id === me.id ? "you" : ""}>{u.name}{u.id === me.id ? " (Ty)" : ""}</td>
                      <td style={{ textAlign: "right", fontFamily: "var(--fd)", fontSize: 18, color: u.total > 0 ? "var(--grass)" : "var(--muted)" }}>{u.total > 0 ? "+" + u.total : "0"}</td>
                      <td style={{ textAlign: "right", fontFamily: "var(--fd)", fontSize: 18, color: "var(--gold)" }}>{cumMap[u.id] || 0}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    );
  }

    const note = (settings.rulesNote || "").trim();
    const Row = ({ l, v, c }) => (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: "1px solid var(--line)" }}>

      <div style={{ display: "grid", gap: 16 }}>

        <div className="panel">

          </div>
        </div>

        <div className="panel">
          <h3 style={{ fontSize: 17, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}><Crown size={16} /> Podział nagród</h3>
          <Row l="🥇 1. miejsce" v={first.toLocaleString("pl-PL") + " zł"} />
          <Row l="🥈 2. miejsce — zwrot wpisowego" v={second.toLocaleString("pl-PL") + " zł"} />
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, paddingTop: 9 }}>
            <span className="muted">Pozostali</span><span className="muted">bez nagrody</span>
          </div>
          <p className="note" style={{ marginTop: 10 }}>Zwycięzca bierze większość puli, drugie miejsce odzyskuje wpisowe. Kwoty przeliczają się same wraz z liczbą graczy.</p>
        </div>

        <div className="panel">
          <h3 style={{ fontSize: 17, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}><Target size={16} /> Punktacja meczowa</h3>
          <Row l="Dokładny wynik" v={"+" + points.exact} c="var(--grass)" />

          <Row l="Pierwszy strzelec" v={"+" + points.scorer} c="var(--grass)" />
          <p className="note" style={{ marginTop: 10 }}>Punkty się sumują — trafiony dokładny wynik daje też punkty za różnicę i zwycięzcę (maks. {maxMatch} pkt + {points.scorer} za strzelca = {maxMatch + (points.scorer || 0)} pkt za mecz).</p>
        </div>

        <div className="panel">
          <h3 style={{ fontSize: 17, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}><Crown size={16} /> Typy bonusowe (cały turniej)</h3>

          <p className="note" style={{ marginTop: 10 }}>Wypełniasz w zakładce „Bonus" do {fmtDate(bonusDeadline)}. Punkty doliczane po rozstrzygnięciu turnieju.</p>

            <p className="note" style={{ marginTop: 8 }}>⚑ „Czarny koń turnieju" to drużyna-niespodzianka — nierozstawiona/niefaworyzowana, która zaszła dalej, niż się spodziewano (np. awans z grupy mimo roli outsidera albo wejście do ćwierćfinału). Zwycięską odpowiedź ustala prowadzący po turnieju; punkt dostaje każdy, kto wskazał tę drużynę.</p>

        <div className="panel">
          <h3 style={{ fontSize: 17, marginBottom: 8, display: "flex", alignItems: "center", gap: 8 }}><Shield size={16} /> Zasady typowania</h3>

            <p style={{ whiteSpace: "pre-wrap", margin: 0, fontSize: 14, lineHeight: 1.55 }}>{note}</p>
          </div>
        )}
      </div>
    );

                <div key={m.id} style={{ border: "1px solid var(--line)", borderRadius: 14, padding: 14, background: "rgba(0,0,0,.18)" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, justifyContent: "space-between", flexWrap: "wrap" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, fontWeight: 700 }}>
                      <Flag code={m.homeCode} size="fl-sm" /> {m.homeTeam}
                      <span className="muted">–</span>
                      <Flag code={m.awayCode} size="fl-sm" /> {m.awayTeam}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                      <span className="muted" style={{ fontSize: 12 }}>{fmtDate(m.kickoff)}{m.city ? " · " + m.city : ""}</span>
                      <button className="icobtn" title="Przypisz drużyny / popraw termin" onClick={() => beginEdit(m)}><Pencil size={16} /></button>
                      <button className="icobtn" title="Usuń mecz" onClick={() => delMatch(m.id)}><Trash2 size={16} /></button>
                    </div>
                  </div>

                  {editId === m.id && (
                    <div style={{ marginTop: 12, padding: 12, borderRadius: 12, background: "rgba(0,0,0,.22)", border: "1px solid var(--line)" }}>
                      <div className="lbl">Przypisz drużyny / popraw termin</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <select className="inp" value={editF.home} onChange={(e) => setEditF((f) => ({ ...f, home: e.target.value }))}>
                          {WC48.map(([n]) => <option key={n} value={n}>{n}</option>)}
                        </select>
                        <select className="inp" value={editF.away} onChange={(e) => setEditF((f) => ({ ...f, away: e.target.value }))}>
                          {WC48.map(([n]) => <option key={n} value={n}>{n}</option>)}
                        </select>
                      </div>
                      <div style={{ marginTop: 10 }}>
                        <input className="inp" type="datetime-local" value={editF.kickoff} onChange={(e) => setEditF((f) => ({ ...f, kickoff: e.target.value }))} />
                      </div>
                      <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                        <button className="btn grass sm" onClick={() => saveEdit(m)}><Check size={15} /> Zapisz</button>
                        <button className="btn ghost sm" onClick={() => setEditId("")}><X size={15} /> Anuluj</button>
                      </div>
                    </div>
                  )}

                  <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginTop: 12, flexWrap: "wrap" }}>
                    <div><div className="lbl">Gosp.</div><input className="inp" style={{ width: 70 }} type="number" min="0" value={r.homeScore ?? ""} onChange={(e) => setRdraft((s) => ({ ...s, [m.id]: { ...r, homeScore: e.target.value } }))} /></div>
                    <div><div className="lbl">Gość</div><input className="inp" style={{ width: 70 }} type="number" min="0" value={r.awayScore ?? ""} onChange={(e) => setRdraft((s) => ({ ...s, [m.id]: { ...r, awayScore: e.target.value } }))} /></div>
                    <div style={{ flex: 1, minWidth: 160 }}><div className="lbl">1. strzelec</div>{(() => {
                      const home = SQUADS[m.homeCode] || [], away = SQUADS[m.awayCode] || [], sortPl = (arr) => [...arr].sort((a, b) => a.localeCompare(b, "pl"));
                      if (!home.length && !away.length) return <input className="inp" value={r.firstScorer ?? ""} onChange={(e) => setRdraft((s) => ({ ...s, [m.id]: { ...r, firstScorer: e.target.value } }))} placeholder="imię i nazwisko" />;
                      return (
                        <select className="inp scorer-sel" value={r.firstScorer ?? ""} onChange={(e) => setRdraft((s) => ({ ...s, [m.id]: { ...r, firstScorer: e.target.value } }))}>
                          <option value="">— brak / nie dotyczy —</option>
                          {home.length > 0 && <optgroup label={m.homeTeam}>{sortPl(home).map((p) => <option key={"h" + p} value={p}>{p}</option>)}</optgroup>}
                          {away.length > 0 && <optgroup label={m.awayTeam}>{sortPl(away).map((p) => <option key={"a" + p} value={p}>{p}</option>)}</optgroup>}
                        </select>
                      );
                    })()}</div>
                  </div>

                  <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                    <button className="btn ghost sm" disabled={espnBusy === m.id} onClick={() => pullEspn(m)}>{espnBusy === m.id ? <RefreshCw size={15} className="spin" /> : <Globe size={15} />} Pobierz z ESPN</button>
                    <button className="btn gold sm" onClick={() => confirmResult(m)}><Check size={15} /> {m.finished ? "Zapisz zmiany" : "Zatwierdź wynik"}</button>
                    {m.finished && <button className="btn danger sm" onClick={() => reopen(m)}><X size={15} /> Cofnij wynik</button>}
                    {m.finished && <span className="chip done" style={{ alignSelf: "center" }}><Check size={13} /> naliczone</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* punktacja */}
        <div className="panel">
          <h2 style={{ fontSize: 19, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><Target size={18} /> Punktacja</h2>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {[["exact", "Dokładny wynik"], ["diff", "Różnica bramek"], ["winner", "Trafiony zwycięzca"], ["scorer", "Trafiony 1. strzelec"]].map(([k, label]) => (
              <div key={k}><div className="lbl">{label}</div>
                <input className="inp" type="number" min="0" value={points[k]} onChange={(e) => setSettings((s) => ({ ...s, points: { ...s.points, [k]: Number(e.target.value) || 0 } }))} /></div>
            ))}
          </div>
          <button className="btn grass" style={{ marginTop: 14 }} onClick={async () => { await store.set("settings", JSON.stringify(settings)); flash("Punktacja zapisana."); }}><Check size={16} /> Zapisz punktację</button>
        </div>

        {/* typy bonusowe */}
        <div className="panel">
          <h2 style={{ fontSize: 19, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}><Crown size={18} /> Typy bonusowe (cały turniej)</h2>
          <p className="muted" style={{ fontSize: 12.5, marginBottom: 12 }}>Ustaw termin zamknięcia i punkty. Poprawne odpowiedzi wpisz po turnieju — punkty naliczą się automatycznie w rankingu.</p>
          <div className="lbl"><Clock size={13} /> Zamknięcie typów bonusowych</div>
          <input className="inp" type="datetime-local" value={toLocalInput(bonusDeadline)} onChange={(e) => setSettings((s) => ({ ...s, bonusDeadline: e.target.value ? new Date(e.target.value).toISOString() : DEFAULT_BONUS_DEADLINE }))} />
          <div className="divider" />
          <div style={{ display: "grid", gap: 12 }}>
            {bonus.map((q) => (
              <div key={q.id} style={{ display: "grid", gap: 8, padding: 12, borderRadius: 12, background: "rgba(0,0,0,.18)", border: "1px solid var(--line)" }}>
                <div style={{ fontWeight: 800 }}>{q.label} <span className="muted" style={{ fontWeight: 400, fontSize: 12 }}>({q.type === "team" ? "drużyna" : "zawodnik"})</span></div>
                <div style={{ display: "grid", gridTemplateColumns: "110px 1fr", gap: 10, alignItems: "end" }}>
                  <div><div className="lbl">Punkty</div>
                    <input className="inp" type="number" min="0" value={q.points} onChange={(e) => { const v = Number(e.target.value) || 0; setSettings((s) => ({ ...s, bonus: bonus.map((x) => x.id === q.id ? { ...x, points: v } : x) })); }} /></div>
                  <div><div className="lbl">Poprawna odpowiedź</div>
                    {q.type === "team" ? (
                      <select className="inp" value={q.answer || ""} onChange={(e) => setSettings((s) => ({ ...s, bonus: bonus.map((x) => x.id === q.id ? { ...x, answer: e.target.value } : x) }))}>
                        <option value="">— nierozstrzygnięte —</option>
                        {WC48.map(([n]) => <option key={n} value={n}>{n}</option>)}
                      </select>
                    ) : (
                      <input className="inp" value={q.answer || ""} onChange={(e) => setSettings((s) => ({ ...s, bonus: bonus.map((x) => x.id === q.id ? { ...x, answer: e.target.value } : x) }))} placeholder="nazwisko zawodnika" />
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button className="btn grass" style={{ marginTop: 14 }} onClick={async () => { await store.set("settings", JSON.stringify({ ...settings, bonus, bonusDeadline })); flash("Typy bonusowe zapisane."); }}><Check size={16} /> Zapisz typy bonusowe</button>
        </div>

        {/* regulamin — dodatkowe zasady */}
        <div className="panel">
          <h2 style={{ fontSize: 19, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}><BookOpen size={18} /> Regulamin — dodatkowe zasady</h2>
          <p className="muted" style={{ fontSize: 12.5, marginBottom: 12 }}>Dowolny tekst widoczny w zakładce „Regulamin" (np. zasady domowe, termin wpłat).</p>
          <textarea className="inp" rows={4} style={{ resize: "vertical", fontFamily: "var(--fb)" }} value={settings.rulesNote || ""} onChange={(e) => setSettings((s) => ({ ...s, rulesNote: e.target.value }))} placeholder="np. Wpłaty do 10 czerwca, wygrana wypłacana po finale…" />
          <button className="btn grass" style={{ marginTop: 12 }} onClick={async () => { await store.set("settings", JSON.stringify(settings)); flash("Regulamin zapisany."); }}><Check size={16} /> Zapisz regulamin</button>
        </div>

        {/* gracze */}
        <div className="panel">
          <h2 style={{ fontSize: 19, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><Users size={18} /> Gracze</h2>
          <div style={{ display: "grid", gap: 8 }}>
            {users.map((u) => (
              <div key={u.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 12px", border: "1px solid var(--line)", borderRadius: 11, background: "rgba(0,0,0,.16)" }}>
                <span style={{ fontWeight: 700 }}>{u.name}{u.isAdmin ? <Shield size={13} style={{ marginLeft: 6, color: "var(--gold)", verticalAlign: "middle" }} /> : null}{u.id === me.id ? <span className="muted" style={{ fontWeight: 400 }}> (Ty)</span> : null}</span>
                <div style={{ display: "flex", gap: 8 }}>
                  <button className="btn ghost sm" onClick={() => toggleAdmin(u)}>{u.isAdmin ? "Odbierz admina" : "Nadaj admina"}</button>
                  {u.id !== me.id && <button className="icobtn" title="Usuń gracza" onClick={() => removeUser(u)}><Trash2 size={16} /></button>}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ---------------- LOGOWANIE ---------------- */
  function renderLogin() {
    const reg = auth.mode === "register";
    return (
      <div className="ms-root" style={{ display: "grid", placeItems: "center", padding: "40px 16px" }}>
        <div style={{ width: "100%", maxWidth: 420 }}>
          <div style={{ textAlign: "center", marginBottom: 22 }}>
            <div className="crest" style={{ width: 64, height: 64, borderRadius: 18, margin: "0 auto 14px" }}><Trophy size={32} /></div>
            <h1 style={{ fontSize: 40 }}>Typer MŚ <span style={{ color: "var(--gold)" }}>2026</span></h1>
            <p className="brand-sub" style={{ marginTop: 6 }}>Pula typerska · mistrzostwa świata</p>
          </div>
          <div className="panel">
            <div className="seg" style={{ gridTemplateColumns: "1fr 1fr", marginBottom: 16 }}>
              <div className={`o ${!reg ? "on" : ""}`} onClick={() => setAuth((a) => ({ ...a, mode: "login", err: "" }))}><LogIn size={16} /> Zaloguj</div>
              <div className={`o ${reg ? "on" : ""}`} onClick={() => setAuth((a) => ({ ...a, mode: "register", err: "" }))}><UserPlus size={16} /> Nowe konto</div>
            </div>
            <div style={{ display: "grid", gap: 12 }}>
              <div><div className="lbl">Imię / ksywa</div>
                {reg
                  ? <input className="inp" value={auth.name} onChange={(e) => setAuth((a) => ({ ...a, name: e.target.value, err: "" }))} placeholder="np. Kuba" />
                  : <select className="inp" value={auth.name} onChange={(e) => setAuth((a) => ({ ...a, name: e.target.value, err: "" }))}>
                      <option value="">— wybierz gracza —</option>
                      {users.map((u) => <option key={u.id} value={u.name}>{u.name}</option>)}
                    </select>}
              </div>
              <div><div className="lbl">PIN (4 cyfry)</div>
                <input className="inp" type="password" inputMode="numeric" maxLength={4} value={auth.pin}
                  onChange={(e) => setAuth((a) => ({ ...a, pin: e.target.value.replace(/\D/g, "").slice(0, 4), err: "" }))} placeholder="••••"
                  onKeyDown={(e) => e.key === "Enter" && (reg ? doRegister() : doLogin())} />
              </div>
              {auth.err && <div style={{ color: "var(--coral)", fontSize: 13, fontWeight: 600 }}>{auth.err}</div>}
              <button className="btn gold" onClick={reg ? doRegister : doLogin} style={{ marginTop: 4 }}>
                {reg ? <><UserPlus size={16} /> Załóż konto</> : <><LogIn size={16} /> Wejdź</>}
              </button>
              {reg && users.length === 0 && <div className="note"><Crown size={14} /> Pierwsze konto zostaje administratorem turnieju.</div>}
            </div>
          </div>
          <p className="note" style={{ marginTop: 14, justifyContent: "center", textAlign: "center" }}>
            <Users size={13} /> Udostępnij ten sam link znajomym — gracie na wspólnej tabeli.
          </p>
        </div>
        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  /* ---------------- RENDER GŁÓWNY ---------------- */
  if (loading) return (
    <div className="ms-root" style={{ display: "grid", placeItems: "center" }}>
      <style>{CSS}</style>
      <div style={{ textAlign: "center" }}>
        <RefreshCw size={40} className="spin" style={{ color: "var(--gold)" }} />
        <p className="muted" style={{ marginTop: 14 }}>Wczytywanie turnieju…</p>
      </div>
    </div>
  );

  if (!me) return (<><style>{CSS}</style>{renderLogin()}</>);

  const upcomingMine = matches.filter((m) => m.homeCode && m.awayCode && !m.finished && now < new Date(m.kickoff).getTime());
  const nextMatch = upcomingMine.slice().sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff))[0];
  const myBets = betsByUser[me.id] || {};
  const hasBet = (m) => { const b = myBets[m.id]; return !!(b && ((b.winner && b.winner !== "") || (b.exactHome !== "" && b.exactHome != null) || (b.firstScorer && b.firstScorer !== ""))); };
  const unbetCount = upcomingMine.filter((m) => !hasBet(m)).length;

  const tabs = [["typuj", "Typuj", Target], ["ranking", "Ranking", Trophy], ["grupy", "Grupy", Globe], ["dni", "Dni", Calendar], ["historia", "Historia", History], ["bonus", "Bonus", Crown], ["regulamin", "Regulamin", BookOpen], ["ustawienia", "Ustawienia", Settings]];
  if (me.isAdmin) tabs.push(["admin", "Panel admina", Shield]);

  return (
    <div className="ms-root">
      <style>{CSS}</style>
      <header className="hdr">
        <div className="wrap" style={{ padding: "12px 16px 0" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
            <div className="brand">
              <div className="crest"><Trophy size={22} /></div>
              <div><div className="brand-tt">Typer MŚ <span style={{ color: "var(--gold)" }}>2026</span></div><div className="brand-sub">pula typerska</div></div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span className="muted" style={{ fontSize: 13, fontWeight: 600 }}>{me.name}{me.isAdmin ? " 👑" : ""}</span>
              <button className="icobtn" title="Odśwież" onClick={loadShared}><RefreshCw size={17} /></button>
              <button className="icobtn" title="Wyloguj" onClick={() => { setMe(null); setDraft({}); }}><LogOut size={17} /></button>
            </div>
          </div>
          <div className="tabs">
            {tabs.map(([id, label, Ico]) => (
              <div key={id} className={`tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}><Ico size={16} /> {label}</div>
            ))}
          </div>
        </div>
      </header>

      <main className="wrap" style={{ padding: "22px 16px 60px" }}>
        {live.length > 0 && (
          <div className="panel live-panel" style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span className="livedot" /><b style={{ letterSpacing: 1 }}>NA ŻYWO</b>
              <span className="muted" style={{ fontSize: 12 }}>· {live.length} {plMecz(live.length)} · odświeża się automatycznie</span>
            </div>
            <div style={{ display: "grid", gap: 8 }}>
              {live.map((g) => (
                <div key={g.id} className="liverow">
                  <div className="lt"><Flag code={g.homeCode} size="fl-sm" /><span className="ln">{CODE2PL[g.homeCode] || g.homeName}</span></div>
                  <div className="lscore">{g.homeScore}<span className="lsep">:</span>{g.awayScore}</div>
                  <div className="lt rt"><span className="ln">{CODE2PL[g.awayCode] || g.awayName}</span><Flag code={g.awayCode} size="fl-sm" /></div>
                  {g.detail && <div className="lmin">{g.detail}</div>}
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{ marginBottom: 18, display: "flex", gap: 12, flexWrap: "wrap", alignItems: "stretch" }}>
          <div className="pot">
            <div className="pot-ic"><Coins size={21} /></div>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <span className="pot-l">Pula nagród</span>
              <span className="pot-sub">{users.length} {plGracz(users.length)} × {STAKE} zł</span>
            </div>
            <span className="pot-amt">{(users.length * STAKE).toLocaleString("pl-PL")} zł</span>
          </div>
          {(() => {
            const ld = standingsFull[0];
            const hasPts = ld && ld.grand > 0;
            return (
              <button className="ministat" onClick={() => setTab("ranking")} title="Zobacz ranking">
                <div className="ms-ic ms-gold"><Crown size={18} /></div>
                <div style={{ display: "flex", flexDirection: "column", gap: 2, textAlign: "left", minWidth: 0 }}>
                  <span className="pot-l">Lider</span>
                  <span className="ms-big" style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 170 }}>{hasPts ? ld.name : "—"}</span>
                  <span className="pot-sub">{hasPts ? `${ld.grand} pkt` : "przed 1. meczami"}</span>
                </div>
              </button>
            );
          })()}
          {nextMatch && (
            <div className="ministat">
              <div className="ms-ic ms-blue"><Clock size={18} /></div>
              <div style={{ display: "flex", flexDirection: "column", gap: 2, minWidth: 0 }}>
                <span className="pot-l">Najbliższy gwizdek</span>
                <span className="ms-big">{fmtDur(new Date(nextMatch.kickoff).getTime() - now)}</span>
                <span className="pot-sub" style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: 200 }}>{(() => { const [a, b] = sidesOf(nextMatch); return `${a.label} – ${b.label}`; })()}</span>
              </div>
            </div>
          )}
          {unbetCount > 0 && (
            <button className="ministat ms-warn" onClick={() => setTab("typuj")} title="Przejdź do typowania">
              <div className="ms-ic ms-red"><Flame size={18} /></div>
              <div style={{ display: "flex", flexDirection: "column", gap: 2, textAlign: "left" }}>
                <span className="pot-l">Do obstawienia</span>
                <span className="ms-big">{unbetCount}</span>
                <span className="pot-sub">{plMecz(unbetCount)} bez typu</span>
              </div>
            </button>
          )}
        </div>
        {tab === "typuj" && renderTypuj()}
        {tab === "ranking" && renderRanking()}
        {tab === "grupy" && renderGrupy()}
        {tab === "dni" && renderDni()}
        {tab === "historia" && renderHistoria()}
        {tab === "bonus" && renderBonus()}
        {tab === "regulamin" && renderRegulamin()}
        {tab === "ustawienia" && renderUstawienia()}
        {tab === "admin" && me.isAdmin && renderAdmin()}
      </main>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
